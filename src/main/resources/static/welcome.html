<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agnes - Sua mentora de Java, do júnior ao pleno">
    <title>Agnes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        /* Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url("data:image/svg+xml;utf8,%3Csvg version='1.1' xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink' width='5' height='5' style='background%2Dcolor:hsl(31,100%,56%);'%3E%3Cline x2='5' y2='5' stroke='hsl(40,100%,68%)' /%3E%3C/svg%3E");
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        svg {
            width: 150px;
            overflow: visible;
            pointer-events: none;
        }

        .a {
            display: grid;
            grid-template-columns: 217px;
            grid-template-rows: 115px;
        }

        .b {
            display: grid;
            width: 415px;
            height: 265px;
            grid-template-columns: repeat(3, 132px);
            grid-template-rows: 115px;
            position: relative;
            margin: 0 auto;
        }

        svg.used {
            display: block;
            justify-self: start;
        }

        svg:nth-of-type(2) {
            justify-self: end;
        }

        /* SVG root */
        #root {
            position: absolute;
            width: 1px;
            left: -100em;
        }

        .theHex {
            pointer-events: all;
        }

        #theHex {
            stroke: #522814;
            stroke-width: 5px;
        }

        use {
            transition: transform 0.3s ease-out;
        }

        .use_lb {
            transform-origin: 47px 101px;
        }

        .use_lt {
            transform-origin: 44px 96px;
        }

        .use_rb {
            transform-origin: 105px 101px;
        }

        .use_rt {
            transform-origin: 108px 96px;
        }

        .use_eyes {
            transform-origin: 104px 76px;
        }

        .theHex~use {
            pointer-events: none;
        }

        .theHex:hover~.use_lb,
        .theHex:hover~.use_lt {
            transform: rotate(25deg);
        }

        .theHex:hover~.use_rb,
        .theHex:hover~.use_rt {
            transform: rotate(-25deg);
        }

        .theHex:hover~.use_eyes {
            transform: scaleY(0.5);
        }

        #snout,
        #ears,
        #wiskers,
        #eyes {
            fill: #522814;
        }

        .tongue {
            fill: hsla(0, 100%, 50%, .5);
        }

        /* conteudo de boas vindas */
        .welcome-container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .welcome-intro {
            margin-top: 30px;
            padding: 0 20px;
        }

        .welcome-intro h1 {
            font-size: 42px;
            font-weight: 700;
            color: #522814;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(82, 40, 20, 0.15);
        }

        .welcome-intro p {
            font-size: 18px;
            color: #7a4a2a;
            max-width: 500px;
            margin: 0 auto 36px;
            line-height: 1.6;
            font-weight: 400;
        }

        .btn-aprender {
            display: inline-block;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: #522814;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(82, 40, 20, 0.3);
        }

        .btn-aprender:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 8px 30px rgba(82, 40, 20, 0.4);
            background: #6b3520;
        }

        .btn-aprender:active {
            transform: scale(0.97);
        }

        /* Responsividade */
        @media (max-width: 500px) {
            .b {
                width: 280px;
                grid-template-columns: repeat(3, 90px);
                grid-template-rows: 80px;
            }

            .a {
                grid-template-columns: 150px;
                grid-template-rows: 80px;
            }

            svg.used {
                width: 100px;
            }

            .welcome-intro h1 {
                font-size: 30px;
            }

            .welcome-intro p {
                font-size: 15px;
            }
        }
    </style>
</head>

    <script>
        let rid = null;
        let cats = [];

        class Path {
            constructor(path) {
                this.memory = [1, 10];
                this.target = this.memory[0];
                this.value = this.memory[1];
                this.path = path;
            }

            updatePath() {
                this.path.setAttributeNS(null, "d", `M75 97H65A5,${this.value} 0 0 0 85,97z`);
            }

            updateValue() {
                let dist = this.target - this.value;
                let vel = dist / 10;
                this.value += vel;
            }
        }

        let svgs = Array.from(document.querySelectorAll("svg.used"));

        svgs.forEach(svg => {
            let tongue = svg.querySelector(".tongue");
            let hex = svg.querySelector(".theHex");
            let p = new Path(tongue);
            cats.push(p);

            hex.addEventListener("mouseover", () => {
                p.target = p.memory[1];
                p.memory.reverse();
            });

            hex.addEventListener("mouseleave", () => {
                p.target = p.memory[1];
                p.memory.reverse();
            });
        });

        function Frame() {
            rid = window.requestAnimationFrame(Frame);
            cats.forEach(p => {
                p.updateValue();
                p.updatePath();
            });
        }

        Frame();
    </script>
